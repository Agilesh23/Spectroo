<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectroo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
        }
        .app-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            height: calc(100vh - 28px);
        }
        .plot-area {
            flex-grow: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .control-panel {
            width: 200px;
            min-width: 200px;
            max-width: 200px;
            background-color: #ffffff;
            border-left: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 12px 10px;
        }
        .section-header {
            font-size: 10px;
            font-weight: bold;
            color: #666666;
            margin-top: 10px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .section-header.first {
            margin-top: 0;
        }
        .separator {
            border-top: 1px solid #eeeeee;
            margin: 10px 0;
        }
        .btn-group {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        button {
            border: 1px solid #cccccc;
            border-radius: 3px;
            padding: 5px 8px;
            background-color: #fafafa;
            color: #333333;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            outline: none;
            transition: background-color 0.1s, border-color 0.1s;
        }
        button:hover:not(:disabled) {
            background-color: #f0f0f0;
            border-color: #b0b0b0;
        }
        button:active:not(:disabled) {
            background-color: #e5e5e5;
        }
        button.active {
            background-color: #0066cc;
            color: #ffffff;
            border-color: #0055bb;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #fafafa;
            border-color: #cccccc;
            color: #999999;
        }
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #555555;
            margin-top: 6px;
            margin-bottom: 8px;
        }
        input[type="number"] {
            border: 1px solid #cccccc;
            border-radius: 3px;
            padding: 4px;
            background-color: #ffffff;
            color: #333333;
            font-size: 11px;
            width: 80px;
            outline: none;
        }
        input[type="number"]:focus {
            border-color: #0066cc;
        }
        .status-bar {
            height: 28px;
            min-height: 28px;
            background-color: #ffffff;
            border-top: 1px solid #dcdcdc;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 25px;
            font-size: 11px;
            color: #555555;
        }
        .status-field {
            white-space: nowrap;
        }
        .status-stretch {
            flex-grow: 1;
        }

        /* History Styles */
        .history-toggle {
            text-align: left;
            background-color: #fafafa;
            border: 1px solid #cccccc;
            border-radius: 3px;
            padding: 5px 8px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-container {
            border: 1px solid #dcdcdc;
            border-radius: 3px;
            margin-top: 4px;
            background-color: #ffffff;
            max-height: 200px;
            display: flex;
            flex-direction: column;
        }
        .history-container.hidden {
            display: none;
        }
        .history-count {
            padding: 4px 8px;
            font-size: 10px;
            color: #777777;
            border-bottom: 1px solid #eee;
            background-color: #fafafa;
        }
        .history-list {
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .history-item {
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
            font-size: 10px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-item:hover {
            background-color: #f5f5f5;
        }
        .history-item.selected {
            background-color: #e6e6e6;
        }

        /* Dev Modals style */
        .dev-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #dev-preview-modal {
            z-index: 1010;
        }
        #dev-password-modal {
            z-index: 1020;
        }
        .dev-modal-overlay.hidden {
            display: none;
        }
        .dev-modal-content {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 750px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            display: flex;
            flex-grow: 0;
            flex-direction: column;
            border: 1px solid #cccccc;
            font-family: Arial, sans-serif;
            color: #333333;
        }
        .dev-modal-header {
            padding: 12px 16px;
            background-color: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dev-modal-header .close-icon {
            cursor: pointer;
            font-size: 18px;
            color: #666666;
        }
        .dev-modal-body {
            padding: 16px;
            flex-grow: 1;
            font-size: 13px;
        }
        .dev-modal-footer {
            padding: 12px 16px;
            background-color: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .dev-btn {
            background-color: #374151;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .dev-btn:hover {
            background-color: #1f2937;
        }
        .dev-btn.primary {
            background-color: #2563eb;
        }
        .dev-btn.primary:hover {
            background-color: #1d4ed8;
        }
        .dev-btn.danger {
            background-color: #ef4444;
            padding: 3px 8px;
        }
        .dev-btn.danger:hover {
            background-color: #dc2626;
        }
        .dev-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .dev-input-row input {
            padding: 4px 8px;
            font-size: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 4px;
            width: 120px;
        }
        .dev-canvas-container {
            background-color: #e5e7eb;
            border: 1px solid #dcdcdc;
            border-radius: 4px;
            width: 100%;
            height: 120px;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #dev-preview-canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .dev-section-title {
            font-weight: bold;
            font-size: 13px;
            margin-top: 12px;
            margin-bottom: 6px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
            color: #111111;
        }
        .dev-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .dev-table th, .dev-table td {
            border: 1px solid #e5e7eb;
            padding: 6px 8px;
            text-align: left;
        }
        .dev-table th {
            background-color: #f9fafb;
            font-weight: bold;
        }
        .dev-status-box {
            padding: 8px 12px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            max-height: 80px;
            overflow-y: auto;
            margin-top: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="plot-area" id="plot-area">
            <canvas id="spectrum-canvas"></canvas>
        </div>
        <div class="control-panel">
            <div class="section-header first">MODE</div>
            <div class="btn-group">
                <button id="mode-single-btn" class="active">Single</button>
                <button id="mode-live-btn">Live</button>
            </div>
            
            <div class="separator"></div>
            
            <div class="section-header">ACQUISITION</div>
            <button id="capture-btn" style="margin-bottom: 6px;">Capture</button>
            <button id="stop-btn" disabled style="margin-bottom: 6px;">Stop</button>
            <div class="input-row">
                <span>Exposure (µs):</span>
                <input type="number" id="exposure-input" value="200000" min="110" max="3066979">
            </div>
            
            <div class="separator"></div>
            
            <div class="section-header">DISPLAY</div>
            <button id="plot-mode-btn" class="active" style="margin-bottom: 6px;">Colour Spectrum</button>
            <button id="baseline-btn" class="active">Baseline Corr</button>
            
            <div class="separator"></div>
            
            <div class="section-header">DATA</div>
            <button id="export-json-btn" disabled style="margin-bottom: 6px;">Export JSON</button>
            <button id="export-csv-btn" disabled>Export CSV</button>
            
            <div class="separator"></div>
            <div class="section-header">SYSTEM</div>
            <button id="shutdown-btn">Shutdown</button>
            <span id="shutdown-status" style="font-size: 11px; margin-top: 4px; display: block;"></span>
            <button id="restart-btn" style="margin-top: 6px;">Restart System</button>
            <span id="restart-status" style="font-size: 11px; margin-top: 4px; display: block;"></span>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="fps-status" class="status-field">FPS: 0.0</span>
        <span id="calib-status" class="status-field">Calibration: Uncalibrated</span>
        <span id="dark-status" class="status-field">Dark Frame: Not Loaded</span>
        <span id="peaks-status" class="status-field">Peaks: None</span>
        <span id="temp-status" class="status-field">CPU Temp: --°C</span>
        <span class="status-stretch"></span>
    </div>

    <!-- 2D Camera Preview Modal -->
    <div id="dev-preview-modal" class="dev-modal-overlay hidden">
        <div class="dev-modal-content">
            <div class="dev-modal-header">
                <span>Live Camera Preview (2D Alignment)</span>
                <span class="close-icon" onclick="closePreviewModal()">&times;</span>
            </div>
            <div class="dev-modal-body">
                <div class="dev-canvas-container">
                    <canvas id="dev-preview-canvas"></canvas>
                </div>
                <div class="dev-input-row">
                    <span>Exposure (µs):</span>
                    <input type="number" id="dev-preview-exp-input" min="110" max="3066979" value="200000">
                    <button class="dev-btn primary" id="dev-preview-exp-apply">Apply</button>
                </div>
                <div id="dev-preview-status" class="dev-status-box">Awaiting image frame...</div>
            </div>
            <div class="dev-modal-footer">
                <button class="dev-btn" onclick="closePreviewModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Developer Password Modal -->
    <div id="dev-password-modal" class="dev-modal-overlay hidden">
        <div class="dev-modal-content" style="width: 320px;">
            <div class="dev-modal-header">
                <span>Developer Authentication</span>
            </div>
            <div class="dev-modal-body">
                <div class="dev-input-row" style="flex-direction: column; align-items: stretch; gap: 8px;">
                    <label for="dev-password-input" style="font-size: 12px;">Enter Developer Password:</label>
                    <input type="password" id="dev-password-input" style="width: 100%; padding: 6px; box-sizing: border-box; font-size: 13px;">
                    <span id="dev-password-error" style="color: #ff4444; font-size: 11px; display: none;">Incorrect password.</span>
                </div>
            </div>
            <div class="dev-modal-footer">
                <button class="dev-btn" id="dev-password-cancel">Cancel</button>
                <button class="dev-btn primary" id="dev-password-submit">Submit</button>
            </div>
        </div>
    </div>

    <!-- Developer & Calibration Control Modal -->
    <div id="dev-control-modal" class="dev-modal-overlay hidden">
        <div class="dev-modal-content" style="width: 400px;">
            <div class="dev-modal-header">
                <span>Developer Tools</span>
                <span class="close-icon" onclick="closeControlModal()">&times;</span>
            </div>
            <div class="dev-modal-body" style="padding: 20px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <button class="dev-btn" id="dev-dark-btn" style="height: 50px; font-size: 13px;">Dark Frame</button>
                    <button class="dev-btn" id="dev-flat-btn" style="height: 50px; font-size: 13px;">Flat Field</button>
                    <button class="dev-btn" id="dev-preview-btn" onclick="openPreviewModal()" style="height: 50px; font-size: 13px;">Camera Preview</button>
                    <button class="dev-btn" onclick="openCalibModal()" style="height: 50px; font-size: 13px;">Calibration</button>
                </div>
                <button class="dev-btn" onclick="closeControlModal()" style="height: 40px; font-size: 13px; background-color: #f3f4f6; color: #333333; border: 1px solid #d1d5db;">Close</button>
            </div>
        </div>
    </div>

    <script>
        // State Variables
        let currentWavelengths = null;
        let currentIntensities = null;
        let currentPeaks = [];
        let fillMode = 'color'; // 'color' | 'plain'
        let showPeaks = true;
        let lastRecordId = null;
        let selectedMode = 'single';
        let streamingActive = false;
        
        let ws = null;
        let frameCount = 0;
        let lastFpsTime = null;
        
        // Zoom and Pan state
        let zoomXMin = null;
        let zoomXMax = null;
        let inspectX = null;
        let inspectIdx = null;
        let isPanning = false;
        let panStartX = null;
        let panStartXMin = null;
        let panStartXMax = null;

        // Colors (must match desktop theme)
        const colors = {
            bg: '#ffffff',
            grid: '#eeeeee',
            axis: '#555555',
            text: '#333333',
            curve: '#444444',
            peakMarker: '#ff4444',
            inspectLine: '#666666'
        };

        // DOM elements
        const canvas = document.getElementById('spectrum-canvas');
        const plotArea = document.getElementById('plot-area');
        
        // Resize Canvas
        function resizeCanvas() {
            const cssWidth = plotArea.clientWidth;
            const cssHeight = plotArea.clientHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = cssWidth * dpr;
            canvas.height = cssHeight * dpr;
            canvas.style.width = cssWidth + "px";
            canvas.style.height = cssHeight + "px";
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
        }
        window.addEventListener('resize', resizeCanvas);
        // Initial defer resize to ensure layout is computed
        setTimeout(resizeCanvas, 0);

        // Bruton Wavelength to RGB conversion
        function wavelengthToRgb(wavelength) {
            const w = parseFloat(wavelength);
            let r = 0.0, g = 0.0, b = 0.0;
            
            if (w >= 380.0 && w < 440.0) {
                r = -(w - 440.0) / (440.0 - 380.0);
                g = 0.0;
                b = 1.0;
            } else if (w >= 440.0 && w < 490.0) {
                r = 0.0;
                g = (w - 440.0) / (490.0 - 440.0);
                b = 1.0;
            } else if (w >= 490.0 && w < 510.0) {
                r = 0.0;
                g = 1.0;
                b = -(w - 510.0) / (510.0 - 490.0);
            } else if (w >= 510.0 && w < 580.0) {
                r = (w - 510.0) / (580.0 - 510.0);
                g = 1.0;
                b = 0.0;
            } else if (w >= 580.0 && w < 645.0) {
                r = 1.0;
                g = -(w - 645.0) / (645.0 - 580.0);
                b = 0.0;
            } else if (w >= 645.0 && w <= 780.0) {
                r = 1.0;
                g = 0.0;
                b = 0.0;
            } else {
                r = 0.0;
                g = 0.0;
                b = 0.0;
            }
            
            let factor = 0.0;
            if (w >= 380.0 && w < 420.0) {
                factor = 0.3 + 0.7 * (w - 380.0) / (420.0 - 380.0);
            } else if (w >= 420.0 && w < 700.0) {
                factor = 1.0;
            } else if (w >= 700.0 && w <= 780.0) {
                factor = 0.3 + 0.7 * (780.0 - w) / (780.0 - 700.0);
            } else {
                factor = 0.0;
            }
            
            const gamma = 0.8;
            const r_adj = r > 0.0 ? Math.pow(r * factor, gamma) : 0.0;
            const g_adj = g > 0.0 ? Math.pow(g * factor, gamma) : 0.0;
            const b_adj = b > 0.0 ? Math.pow(b * factor, gamma) : 0.0;
            
            return [
                Math.floor(r_adj * 255),
                Math.floor(g_adj * 255),
                Math.floor(b_adj * 255)
            ];
        }

        // Draw Spectrum
        function drawSpectrum(wavelengths, intensities, peaks) {
            currentWavelengths = wavelengths;
            currentIntensities = intensities;
            currentPeaks = peaks;

            const rawCanvas = document.getElementById('spectrum-canvas');
            const canvas = {
                width: rawCanvas.clientWidth,
                height: rawCanvas.clientHeight,
                getContext: (t) => rawCanvas.getContext(t)
            };

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const margin = { left: 65, right: 35, top: 35, bottom: 50 };
            const plotW = canvas.width - margin.left - margin.right;
            const plotH = canvas.height - margin.top - margin.bottom;

            if (plotW <= 0 || plotH <= 0) return;

            // Y axis label rotated -90 degrees
            ctx.save();
            ctx.translate(margin.left - 48, margin.top + plotH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillStyle = colors.text;
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Intensity (Counts)', 0, 0);
            ctx.restore();

            const hasData = wavelengths && intensities && wavelengths.length > 0 && intensities.length > 0;

            // X axis label
            let xLabel = 'Wavelength (nm)';
            if (hasData) {
                if ((wavelengths[wavelengths.length - 1] - wavelengths[0]) < 200) {
                    xLabel = 'Pixel';
                }
            }
            ctx.fillStyle = colors.text;
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(xLabel, margin.left + plotW / 2, canvas.height - margin.bottom + 28);

            if (!hasData) {
                ctx.strokeStyle = colors.axis;
                ctx.lineWidth = 1;
                ctx.strokeRect(margin.left, margin.top, plotW, plotH);

                ctx.fillStyle = colors.text;
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Awaiting Frame Data...', margin.left + plotW / 2, margin.top + plotH / 2);
                return;
            }

            // Ranges
            const fullMin = wavelengths[0];
            const fullMax = wavelengths[wavelengths.length - 1];
            const xMin = zoomXMin !== null ? zoomXMin : fullMin;
            const xMax = zoomXMax !== null ? zoomXMax : fullMax;

            const yMin = 0.0;
            const yMax = Math.max(1.0, Math.max(...intensities));
            const yLimit = yMax * 1.15;

            // Horizontal Grid & Y labels
            const yTicks = [0, 1, 2, 3, 4].map(i => i * (yLimit / 4.0));
            ctx.font = '8px Arial';
            ctx.fillStyle = colors.text;

            yTicks.forEach(yVal => {
                const py = canvas.height - margin.bottom - (yVal / yLimit) * plotH;
                ctx.strokeStyle = colors.grid;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(margin.left, py);
                ctx.lineTo(canvas.width - margin.right, py);
                ctx.stroke();

                ctx.strokeStyle = colors.axis;
                ctx.beginPath();
                ctx.moveTo(margin.left - 5, py);
                ctx.lineTo(margin.left, py);
                ctx.stroke();

                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.round(yVal).toString(), margin.left - 7, py);
            });

            // Adaptive X Ticks
            const rangeX = xMax - xMin;
            let step = 1.0;
            if (rangeX > 0) {
                const rawStep = rangeX / 6.0;
                const exponent = Math.floor(Math.log10(rawStep));
                const fraction = rawStep / Math.pow(10, exponent);
                let niceFraction = 1.0;
                if (fraction < 1.5) niceFraction = 1.0;
                else if (fraction < 3.0) niceFraction = 2.0;
                else if (fraction < 7.0) niceFraction = 5.0;
                else niceFraction = 10.0;
                step = niceFraction * Math.pow(10, exponent);
            }

            const xTicks = [];
            let startTick = Math.ceil(xMin / step) * step;
            while (startTick <= xMax) {
                xTicks.push(startTick);
                startTick += step;
            }

            xTicks.forEach(xVal => {
                if (xMax === xMin) return;
                const px = margin.left + (xVal - xMin) / (xMax - xMin) * plotW;
                if (px < margin.left || px > canvas.width - margin.right) return;

                ctx.strokeStyle = colors.grid;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(px, margin.top);
                ctx.lineTo(px, canvas.height - margin.bottom);
                ctx.stroke();

                ctx.strokeStyle = colors.axis;
                ctx.beginPath();
                ctx.moveTo(px, canvas.height - margin.bottom);
                ctx.lineTo(px, canvas.height - margin.bottom + 5);
                ctx.stroke();

                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(Math.round(xVal).toString(), px, canvas.height - margin.bottom + 8);
            });

            // Axis Border Box
            ctx.strokeStyle = colors.axis;
            ctx.lineWidth = 1;
            ctx.strokeRect(margin.left, margin.top, plotW, plotH);

            // Filter points for canvas drawing
            let sliceStart = wavelengths.findIndex(w => w >= xMin);
            if (sliceStart > 0) sliceStart--;
            if (sliceStart < 0) sliceStart = 0;

            let sliceEnd = wavelengths.length - 1;
            for (let i = wavelengths.length - 1; i >= 0; i--) {
                if (wavelengths[i] <= xMax) {
                    sliceEnd = i;
                    break;
                }
            }
            if (sliceEnd < wavelengths.length - 1) sliceEnd++;

            const sliceWl = wavelengths.slice(sliceStart, sliceEnd + 1);
            const sliceInt = intensities.slice(sliceStart, sliceEnd + 1);

            const pxArr = [];
            const pyArr = [];
            for (let i = 0; i < sliceWl.length; i++) {
                const px = xMax !== xMin ? margin.left + (sliceWl[i] - xMin) / (xMax - xMin) * plotW : margin.left;
                const py = canvas.height - margin.bottom - (sliceInt[i] / yLimit) * plotH;
                pxArr.push(px);
                pyArr.push(py);
            }

            // Clip drawing to grid box
            ctx.save();
            ctx.beginPath();
            ctx.rect(margin.left, margin.top, plotW, plotH);
            ctx.clip();

            // Gradient / Plain Fill
            if (pxArr.length > 0) {
                ctx.beginPath();
                ctx.moveTo(pxArr[0], canvas.height - margin.bottom);
                for (let i = 0; i < pxArr.length; i++) {
                    ctx.lineTo(pxArr[i], pyArr[i]);
                }
                ctx.lineTo(pxArr[pxArr.length - 1], canvas.height - margin.bottom);
                ctx.closePath();

                if (fillMode === 'color') {
                    const grad = ctx.createLinearGradient(margin.left, 0, canvas.width - margin.right, 0);
                    const numStops = 60;
                    const isCalibrated = (fullMax - fullMin) > 200;

                    for (let stopI = 0; stopI <= numStops; stopI++) {
                        const t = stopI / numStops;
                        const stopVal = xMin + t * (xMax - xMin);
                        let wl = stopVal;
                        if (!isCalibrated) {
                            if (fullMax > 0) {
                                wl = 380.0 + (stopVal / fullMax) * (780.0 - 380.0);
                            } else {
                                wl = 380.0;
                            }
                        }
                        const rgb = wavelengthToRgb(wl);
                        grad.addColorStop(t, `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`);
                    }
                    ctx.fillStyle = grad;
                } else {
                    ctx.fillStyle = '#f0f0f0';
                }
                ctx.fill();
            }

            // Inspect/Cursor crosshair lines (behind the curve)
            if (inspectIdx !== null && wavelengths && intensities && inspectIdx < wavelengths.length) {
                const inspectW = wavelengths[inspectIdx];
                const inspectY = intensities[inspectIdx];
                const px = xMax !== xMin ? margin.left + (inspectW - xMin) / (xMax - xMin) * plotW : margin.left;
                const py = canvas.height - margin.bottom - (inspectY / yLimit) * plotH;

                ctx.strokeStyle = 'rgba(150, 150, 150, 0.6)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);

                // Vertical dashed line down to the x-axis
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px, canvas.height - margin.bottom);
                ctx.stroke();

                // Horizontal dashed line across to the y-axis (left margin)
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(margin.left, py);
                ctx.stroke();

                ctx.setLineDash([]);
            }

            // Curve line
            if (pxArr.length > 0) {
                ctx.strokeStyle = colors.curve;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(pxArr[0], pyArr[0]);
                for (let i = 1; i < pxArr.length; i++) {
                    ctx.lineTo(pxArr[i], pyArr[i]);
                }
                ctx.stroke();
            }

            // Peak dashed lines and labels
            const isCalibrated = (fullMax - fullMin) > 200;
            if (showPeaks) {
                peaks.forEach(idx => {
                    if (idx < 0 || idx >= wavelengths.length) return;
                    const pkX = wavelengths[idx];
                    if (pkX < xMin || pkX > xMax) return;
                    const pkY = intensities[idx];

                    const px = xMax !== xMin ? margin.left + (pkX - xMin) / (xMax - xMin) * plotW : margin.left;
                    const py = canvas.height - margin.bottom - (pkY / yLimit) * plotH;

                    // Dashed line
                    ctx.strokeStyle = colors.peakMarker;
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(px, canvas.height - margin.bottom);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Text
                    ctx.fillStyle = colors.text;
                    ctx.font = '8px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    const label = isCalibrated ? Math.round(pkX) + ' nm' : 'Px ' + pkX;
                    ctx.fillText(label, px, py - 5);
                });
            }

            ctx.restore();

            // Readout box in top-left corner of chart area
            if (inspectIdx !== null && wavelengths && intensities && inspectIdx < wavelengths.length) {
                const inspectW = wavelengths[inspectIdx];
                const inspectY = intensities[inspectIdx];
                const isCalibrated = (fullMax - fullMin) > 200;

                const boxW = 156;
                const boxH = 65;
                const boxX = margin.left + 8;
                const boxY = margin.top + 8;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(boxX, boxY, boxW, boxH, 4);
                } else {
                    ctx.rect(boxX, boxY, boxW, boxH);
                }
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = colors.text;
                ctx.font = '12px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';

                ctx.fillText(`Pixel: ${inspectIdx}`, boxX + 10, boxY + 8);
                if (isCalibrated) {
                    ctx.fillText(`Wavelength: ${inspectW.toFixed(1)} nm`, boxX + 10, boxY + 24);
                } else {
                    ctx.fillText(`Pixel: ${inspectW.toFixed(0)}`, boxX + 10, boxY + 24);
                }
                ctx.fillText(`Intensity: ${inspectY.toFixed(1)}`, boxX + 10, boxY + 40);
            }
        }

        // Canvas interaction
        canvas.addEventListener('mousedown', (e) => {
            if (!currentWavelengths || currentWavelengths.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const margin = { left: 65, right: 35, top: 35, bottom: 50 };
            const plotW = canvas.clientWidth - margin.left - margin.right;

            if (e.button === 2) { // Right click reset
                e.preventDefault();
                zoomXMin = null;
                zoomXMax = null;
                inspectX = null;
                inspectIdx = null;
                drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
                return;
            }

            const isPanClick = e.button === 1 || (e.button === 0 && e.ctrlKey);
            if (isPanClick) {
                isPanning = true;
                panStartX = mouseX;
                const fullMin = currentWavelengths[0];
                const fullMax = currentWavelengths[currentWavelengths.length - 1];
                panStartXMin = zoomXMin !== null ? zoomXMin : fullMin;
                panStartXMax = zoomXMax !== null ? zoomXMax : fullMax;
                return;
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!currentWavelengths || currentWavelengths.length === 0) return;
            if (isPanning) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const dx = mouseX - panStartX;

                const margin = { left: 65, right: 35, top: 35, bottom: 50 };
                const plotW = canvas.clientWidth - margin.left - margin.right;
                if (plotW <= 0) return;

                const dataPerPx = (panStartXMax - panStartXMin) / plotW;
                const shift = -dx * dataPerPx;

                const fullMin = currentWavelengths[0];
                const fullMax = currentWavelengths[currentWavelengths.length - 1];
                const rng = panStartXMax - panStartXMin;

                let newMin = Math.max(fullMin, panStartXMin + shift);
                let newMax = newMin + rng;
                if (newMax > fullMax) {
                    newMax = fullMax;
                    newMin = newMax - rng;
                }

                zoomXMin = newMin;
                zoomXMax = newMax;
                drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
            }
        });

        window.addEventListener('mouseup', () => {
            isPanning = false;
        });

        canvas.addEventListener('wheel', (e) => {
            if (!currentWavelengths || currentWavelengths.length === 0) return;
            e.preventDefault();

            const factor = e.deltaY < 0 ? 0.8 : 1.25;
            const fullMin = currentWavelengths[0];
            const fullMax = currentWavelengths[currentWavelengths.length - 1];

            const xMin = zoomXMin !== null ? zoomXMin : fullMin;
            const xMax = zoomXMax !== null ? zoomXMax : fullMax;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - 65; // margin left
            const margin = { left: 65, right: 35, top: 35, bottom: 50 };
            const plotW = canvas.clientWidth - margin.left - margin.right;
            if (plotW <= 0) return;

            const t = Math.max(0.0, Math.min(1.0, mouseX / plotW));
            const center = xMin + t * (xMax - xMin);
            const newHalf = (xMax - xMin) * factor / 2;

            let newMin = Math.max(fullMin, center - newHalf);
            let newMax = Math.min(fullMax, center + newHalf);

            if (newMax - newMin < 5) return;

            if (newMin <= fullMin && newMax >= fullMax) {
                zoomXMin = null;
                zoomXMax = null;
            } else {
                zoomXMin = newMin;
                zoomXMax = newMax;
            }

            drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
        }, { passive: false });

        canvas.addEventListener('dblclick', () => {
            zoomXMin = null;
            zoomXMax = null;
            inspectX = null;
            inspectIdx = null;
            drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!currentWavelengths || currentWavelengths.length === 0) return;
            if (isPanning) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const margin = { left: 65, right: 35, top: 35, bottom: 50 };
            const logicalWidth = canvas.clientWidth;
            const logicalHeight = canvas.clientHeight;
            const plotW = logicalWidth - margin.left - margin.right;
            const plotH = logicalHeight - margin.top - margin.bottom;

            if (mouseX >= margin.left && mouseX <= logicalWidth - margin.right &&
                mouseY >= margin.top && mouseY <= logicalHeight - margin.bottom) {

                const fullMin = currentWavelengths[0];
                const fullMax = currentWavelengths[currentWavelengths.length - 1];
                const xMin = zoomXMin !== null ? zoomXMin : fullMin;
                const xMax = zoomXMax !== null ? zoomXMax : fullMax;

                const frac = (mouseX - margin.left) / plotW;
                const targetVal = xMin + frac * (xMax - xMin);

                let minDiff = Infinity;
                let bestIdx = 0;
                for (let i = 0; i < currentWavelengths.length; i++) {
                    const diff = Math.abs(currentWavelengths[i] - targetVal);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestIdx = i;
                    }
                }

                inspectIdx = bestIdx;
                inspectX = currentWavelengths[bestIdx];
                drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
            } else {
                if (inspectIdx !== null) {
                    inspectIdx = null;
                    inspectX = null;
                    drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
                }
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (inspectIdx !== null) {
                inspectIdx = null;
                inspectX = null;
                drawSpectrum(currentWavelengths, currentIntensities, currentPeaks);
            }
        });

        function updateCpuTemp(temp, warn) {
            const tempEl = document.getElementById('temp-status');
            if (tempEl) {
                if (temp !== null && temp !== undefined) {
                    let text = `CPU Temp: ${temp.toFixed(1)}°C`;
                    if (warn) {
                        text += ' (WARNING: OVERHEAT)';
                        tempEl.style.color = '#cc0000';
                        tempEl.style.fontWeight = 'bold';
                    } else {
                        tempEl.style.color = '';
                        tempEl.style.fontWeight = '';
                    }
                    tempEl.innerText = text;
                } else {
                    tempEl.style.color = '';
                    tempEl.style.fontWeight = '';
                    tempEl.innerText = 'CPU Temp: --°C';
                }
            }
        }

        // Status Updater
        function updateStatusBar(status) {
            if (status.calibrated !== undefined) {
                document.getElementById('calib-status').innerText = `Calibration: ${status.calibrated ? 'Calibrated' : 'Uncalibrated'}`;
            }
            if (status.dark_loaded !== undefined) {
                document.getElementById('dark-status').innerText = `Dark Frame: ${status.dark_loaded ? 'Loaded' : 'Not Loaded'}`;
            }
            if (status.cpu_temp !== undefined) {
                updateCpuTemp(status.cpu_temp, status.cpu_temp_warn);
            }
            if (status.baseline_enabled !== undefined) {
                const baselineBtn = document.getElementById('baseline-btn');
                if (status.baseline_enabled) {
                    baselineBtn.classList.add('active');
                } else {
                    baselineBtn.classList.remove('active');
                }
            }
        }

        function updatePeaksStatus(peaks, calibrated) {
            const label = document.getElementById('peaks-status');
            if (peaks && peaks.length > 0) {
                const peakstrs = [];
                for (let i = 0; i < Math.min(3, peaks.length); i++) {
                    const idx = peaks[i];
                    if (currentWavelengths && idx < currentWavelengths.length) {
                        const val = currentWavelengths[idx];
                        if (calibrated) {
                            peakstrs.push(`${val.toFixed(1)} nm`);
                        } else {
                            peakstrs.push(`${Math.round(val)} px`);
                        }
                    }
                }
                label.innerText = `Peaks: ${peakstrs.join(', ')}`;
            } else {
                label.innerText = 'Peaks: None';
            }
        }

        // Fetch Status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');

                updateStatusBar(data);
                if (data.live_active) {
                    if (!streamingActive) {
                        setSelectedMode('live');
                        setStreamingState(true);
                        connectWebSocket();
                    }
                } else {
                    if (streamingActive) {
                        setSelectedMode('single');

            } catch (err) {

        async function startLive() {
            try {
                const res = await fetch('/api/live/start', { method: 'POST' });
                if (res.ok) {
                    setStreamingState(true);
                    connectWebSocket();
                }
            } catch (err) {
                console.error("Error starting live mode:", err);
            }
        }

        async function stopLive() {
            try {
                if (ws) {
                    ws.close();
                    ws = null;
                }
                await fetch('/api/live/stop', { method: 'POST' });
                setStreamingState(false);
            } catch (err) {
                console.error("Error stopping live mode:", err);
            }
        }

        function connectWebSocket() {
            if (ws) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/live`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                frameCount = 0;
                lastFpsTime = performance.now();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.error) {
                    if (data.error === "device busy") {
                        alert("Device busy — another client is connected.");
                    } else {
                        alert("WebSocket error: " + data.error);
                    }
                    stopLive();
                    return;
                }
                
                // Track FPS
                frameCount++;
                const now = performance.now();
                if (!lastFpsTime) lastFpsTime = now;
                const elapsed = now - lastFpsTime;
                if (elapsed >= 1000) {
                    const fps = (frameCount * 1000) / elapsed;
                    document.getElementById('fps-status').innerText = `FPS: ${fps.toFixed(1)}`;
                    frameCount = 0;
                    lastFpsTime = now;
                }
                
                // Draw frame
                drawSpectrum(data.wavelengths, data.intensities, data.peaks);
                exportJsonBtn.disabled = false;
                exportCsvBtn.disabled = false;
                
                // Check calibration status and update peaks label
                const isCalibrated = (data.wavelengths[data.wavelengths.length - 1] - data.wavelengths[0]) > 200;
                updatePeaksStatus(data.peaks, isCalibrated);

                // Update CPU Temp from WebSocket live frame
                if (data.cpu_temp !== undefined) {
                    updateCpuTemp(data.cpu_temp, data.cpu_temp_warn);
                }
            };
            
            ws.onclose = () => {
                ws = null;
                setStreamingState(false);
            };
            
            ws.onerror = (err) => {
                console.error("WebSocket error:", err);
                stopLive();
            };
        }

                const res = await fetch('/api/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exposure_us })
                });
                if (res.status === 503) {
                    alert("Camera not available");
                    return;
                }
                if (res.status === 409) {
                    alert("Live mode active — stop live before single capture");
                    return;
                }
                
                const data = await res.json();
                drawSpectrum(data.wavelengths, data.intensities, data.peaks);
                exportJsonBtn.disabled = false;
                exportCsvBtn.disabled = false;
                
                const isCalibrated = (data.wavelengths[data.wavelengths.length - 1] - data.wavelengths[0]) > 200;
                updatePeaksStatus(data.peaks, isCalibrated);
                
                // Fetch status to refresh dark/calib status
                fetchStatus();
            } catch (err) {
                console.error("Error during capture:", err);

                captureBtn.disabled = false;
                captureBtn.innerText = 'Capture';

        // Exposure Change
        async function updateExposure() {
            const val = parseInt(exposureInput.value);
            if (isNaN(val) || val < 110) {
                exposureInput.value = 110;
            } else if (val > 3066979) {
                exposureInput.value = 3066979;
            }
            const clamped = parseInt(exposureInput.value);
            
            try {
                const res = await fetch('/api/exposure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exposure_us: clamped })
                });
                const data = await res.json();
                exposureInput.value = data.exposure_us;
            } catch (err) {
                console.error("Error updating exposure:", err);
            }
        }

        // Dev Mode Logic
        let previewInterval = null;

        async function fetchDev(url, options = {}) {
            let devPasswordVal = devPassword || 'changeme';
            if (!options.headers) options.headers = {};
            
            const urlObj = new URL(url, window.location.origin);
            urlObj.searchParams.set('password', devPasswordVal);
            
            let res = await fetch(urlObj.toString(), options);
            if (res.status === 401) {
                devPasswordVal = prompt("Invalid developer password. Enter developer password:");
                if (devPasswordVal) {
                    devPassword = devPasswordVal;
                    urlObj.searchParams.set('password', devPasswordVal);
                    res = await fetch(urlObj.toString(), options);
                }
            }
            return res;
        }

        // Camera Preview
        async function openPreviewModal() {
            if (streamingActive) {
                alert("Live mode active — stop live before previewing raw camera");
                return;
            }
            document.getElementById('dev-preview-modal').classList.remove('hidden');
            const expInput = document.getElementById('dev-preview-exp-input');
            const mainExp = document.getElementById('exposure-input');
            expInput.value = mainExp.value;
            
            const statusEl = document.getElementById('dev-preview-status');
            statusEl.innerText = "Loading camera source...";
            
            try {
                const res = await fetch('/api/dev/preview/start', { method: 'POST' });
                if (!res.ok) {
                    const detail = (await res.json()).detail || "Failed to start preview";
                    statusEl.innerText = `Error: ${detail}`;
                    return;
                }
            } catch (err) {
                statusEl.innerText = `Error: ${err.message}`;
                return;
            }
            
            startPreviewFeed();
        }

        function closePreviewModal() {
            document.getElementById('dev-preview-modal').classList.add('hidden');
            stopPreviewFeed();
            fetch('/api/dev/preview/stop', { method: 'POST' }).catch(err => console.error(err));
        }

        function startPreviewFeed() {
            if (previewInterval) clearInterval(previewInterval);
            updatePreviewFrame();
            previewInterval = setInterval(updatePreviewFrame, 150); // 150ms
        }

        function stopPreviewFeed() {
            if (previewInterval) {
                clearInterval(previewInterval);
                previewInterval = null;
            }
        }

        async function updatePreviewFrame() {
            const statusEl = document.getElementById('dev-preview-status');
            try {
                const res = await fetchDev('/api/dev/preview');
                if (res.status === 409) {
                    statusEl.innerText = "Conflict: " + (await res.json()).detail;
                    closePreviewModal();
                    return;
                }
                if (!res.ok) {
                    const detail = (await res.json()).detail || "Error";
                    statusEl.innerText = `Error: ${detail}`;
                    return;
                }
                const data = await res.json();
                statusEl.innerText = `Frame: ${data.width}x${data.height} pixels | normalized to 8-bit scale`;
                
                const canvas = document.getElementById('dev-preview-canvas');
                canvas.width = data.width;
                canvas.height = data.height;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(data.width, data.height);
                
                const pixels = data.data;
                const channels = data.channels || 1;
                
                if (channels === 3) {
                    for (let i = 0; i < pixels.length / 3; i++) {
                        const offset = i * 4;
                        const srcOffset = i * 3;
                        imgData.data[offset] = pixels[srcOffset];
                        imgData.data[offset+1] = pixels[srcOffset+1];
                        imgData.data[offset+2] = pixels[srcOffset+2];
                        imgData.data[offset+3] = 255;
                    }
                } else {
                    for (let i = 0; i < pixels.length; i++) {
                        const val = pixels[i];
                        const offset = i * 4;
                        imgData.data[offset] = val;
                        imgData.data[offset+1] = val;
                        imgData.data[offset+2] = val;
                        imgData.data[offset+3] = 255;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            } catch (err) {
                statusEl.innerText = `Connection error: ${err.message}`;
            }
        }

        document.getElementById('dev-preview-exp-apply').addEventListener('click', async () => {
            const expInput = document.getElementById('dev-preview-exp-input');
            const clamped = parseInt(expInput.value);
            try {
                const res = await fetch('/api/exposure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ exposure_us: clamped })
                });
                const data = await res.json();
                expInput.value = data.exposure_us;
                document.getElementById('exposure-input').value = data.exposure_us;
            } catch (err) {
                console.error(err);
            }
        });

        function startCalibPoll() {
            if (calibPollInterval) clearInterval(calibPollInterval);
            updateCalibSpectrum();
            calibPollInterval = setInterval(updateCalibSpectrum, 500);
        }

        function stopCalibPoll() {
            if (calibPollInterval) {
                clearInterval(calibPollInterval);
                calibPollInterval = null;
            }
        }

        async function updateCalibSpectrum() {
            try {
                const res = await fetch('/api/current_frame');
                if (!res.ok) return;
                const data = await res.json();
                drawCalibSpectrum(data.intensities);
            } catch (err) {
                console.error("Error polling calib spectrum:", err);
            }
        }

        function drawCalibSpectrum(intensities) {
            const canvas = document.getElementById('dev-calib-canvas');
            if (!canvas) return;
            
            const dpr = window.devicePixelRatio || 1;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            if (!intensities || intensities.length === 0) {
                ctx.fillStyle = '#333333';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Awaiting live data...', width / 2, height / 2);
                return;
            }
            
            const margin = { left: 40, right: 10, top: 10, bottom: 20 };
            const plotW = width - margin.left - margin.right;
            const plotH = height - margin.top - margin.bottom;
            
            if (plotW <= 0 || plotH <= 0) return;
            
            ctx.strokeStyle = '#555555';
            ctx.lineWidth = 1;
            ctx.strokeRect(margin.left, margin.top, plotW, plotH);
            
            const yMax = Math.max(1.0, Math.max(...intensities)) * 1.15;
            const len = intensities.length;
            
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            for (let i = 0; i < len; i++) {
                const px = margin.left + (i / (len - 1)) * plotW;
                const py = margin.top + plotH - (intensities[i] / yMax) * plotH;
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.stroke();
            
            ctx.fillStyle = '#333333';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('0', margin.left, margin.top + plotH + 3);
            ctx.fillText((len - 1).toString(), margin.left + plotW, margin.top + plotH + 3);
            
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(Math.round(yMax).toString(), margin.left - 5, margin.top);
            ctx.fillText('0', margin.left - 5, margin.top + plotH);
        }

        // Developer Control Modal
        function openControlModal() {
            document.getElementById('dev-control-modal').classList.remove('hidden');
            initCalibTable();
            startCalibPoll();
        }

        function closeControlModal() {
            document.getElementById('dev-control-modal').classList.add('hidden');
            stopCalibPoll();
            fetch('/api/dev/preview/stop', { method: 'POST' }).catch(() => {});
        }

        function openCalibModal() {
            alert("Calibration feature coming soon!");
        }

        // Dark/Flat capture handlers
        document.getElementById('dev-dark-btn').addEventListener('click', async () => {
            if (streamingActive) {
                alert("Live mode active — stop live before capturing dark frame");
                return;
            }
            if (!confirm("Cover the lens completely to block all light, then click OK to capture dark frame.")) {
                return;
            }
            try {
                const res = await fetchDev('/api/dev/dark', { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    fetchStatus();
                } else {
                    alert(`Error: ${data.detail}`);
                }
            } catch (err) {
                alert(`Connection error: ${err.message}`);
            }
        });

        document.getElementById('dev-flat-btn').addEventListener('click', async () => {
            if (streamingActive) {
                alert("Live mode active — stop live before capturing flat field");
                return;
            }
            try {
                const res = await fetchDev('/api/dev/flat', { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    fetchStatus();
                } else {
                    alert(`Error: ${data.detail}`);
                }
            } catch (err) {
                alert(`Connection error: ${err.message}`);
            }
        });

        // Wavelength Calibration UI
        const defaultPairs = [
            { pixel: 500, wavelength: 435.8 },
            { pixel: 1000, wavelength: 546.1 }
        ];

        function initCalibTable() {
            const tbody = document.getElementById('dev-calib-tbody');
            tbody.innerHTML = '';
            let saved = localStorage.getItem('calib_pairs');
            let pairs = saved ? JSON.parse(saved) : defaultPairs;

            // Get current fit result and check if it's stale
            let savedFitPairsStr = localStorage.getItem('calib_fit_pairs');
            let savedFit = localStorage.getItem('calib_fit_result');
            let isStale = false;
            let fitResult = null;
            if (savedFit) {
                fitResult = JSON.parse(savedFit);
                if (!savedFitPairsStr) {
                    isStale = true;
                } else {
                    const fitPairs = JSON.parse(savedFitPairsStr);
                    if (fitPairs.length !== pairs.length) {
                        isStale = true;
                    } else {
                        for (let i = 0; i < pairs.length; i++) {
                            if (pairs[i].pixel !== fitPairs[i].pixel || 
                                pairs[i].wavelength !== fitPairs[i].wavelength) {
                                isStale = true;
                                break;
                            }
                        }
                    }
                }
            }

            pairs.forEach((p, idx) => {
                let residual = '-';
                if (fitResult && !isStale && fitResult.residuals_nm && idx < fitResult.residuals_nm.length) {
                    residual = fitResult.residuals_nm[idx].toFixed(4);
                }
                tbody.appendChild(createCalibRowHtml(p.pixel, p.wavelength, residual));
            });

            if (fitResult) {
                displayFitResult(fitResult, isStale);
            } else {
                document.getElementById('dev-calib-status').innerText = "Enter at least 2 mapping pairs and click Fit.";
                document.getElementById('dev-calib-status').style.opacity = "1";
            }
        }

        function createCalibRowHtml(pixel, wavelength, residual) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="number" class="calib-pixel" value="${pixel}" min="0" max="3000" style="width: 80px;"></td>
                <td><input type="number" class="calib-wavelength" value="${wavelength}" step="0.1" style="width: 100px;"></td>
                <td class="calib-residual">${residual}</td>
                <td><button class="dev-btn danger" onclick="this.closest('tr').remove(); savePairsToLocal(); checkStale();">Remove</button></td>
            `;
            tr.querySelectorAll('input').forEach(input => {
                input.addEventListener('change', () => {
                    savePairsToLocal();
                    checkStale();
                });
            });
            return tr;
        }

        function addCalibRow() {
            const tbody = document.getElementById('dev-calib-tbody');
            tbody.appendChild(createCalibRowHtml(0, 0, '-'));
            savePairsToLocal();
            checkStale();
        }

        function savePairsToLocal() {
            const tbody = document.getElementById('dev-calib-tbody');
            const pairs = [];
            tbody.querySelectorAll('tr').forEach(tr => {
                const px = parseInt(tr.querySelector('.calib-pixel').value);
                const wl = parseFloat(tr.querySelector('.calib-wavelength').value);
                if (!isNaN(px) && !isNaN(wl)) {
                    pairs.push({ pixel: px, wavelength: wl });
                }
            });
            localStorage.setItem('calib_pairs', JSON.stringify(pairs));
        }

        function checkStale() {
            const tbody = document.getElementById('dev-calib-tbody');
            const currentPairs = [];
            tbody.querySelectorAll('tr').forEach(tr => {
                const px = parseInt(tr.querySelector('.calib-pixel').value);
                const wl = parseFloat(tr.querySelector('.calib-wavelength').value);
                currentPairs.push({ pixel: px, wavelength: wl });
            });

            const savedFitPairsStr = localStorage.getItem('calib_fit_pairs');
            let isStale = false;
            if (!savedFitPairsStr) {
                isStale = true;
            } else {
                const fitPairs = JSON.parse(savedFitPairsStr);
                if (fitPairs.length !== currentPairs.length) {
                    isStale = true;
                } else {
                    for (let i = 0; i < currentPairs.length; i++) {
                        if (currentPairs[i].pixel !== fitPairs[i].pixel || 
                            currentPairs[i].wavelength !== fitPairs[i].wavelength) {
                            isStale = true;
                            break;
                        }
                    }
                }
            }

            const savedFit = localStorage.getItem('calib_fit_result');
            if (savedFit) {
                const fitResult = JSON.parse(savedFit);
                displayFitResult(fitResult, isStale);
            } else {
                document.getElementById('dev-calib-status').innerText = "Enter at least 2 mapping pairs and click Fit.";
                document.getElementById('dev-calib-status').style.opacity = "1";
            }
        }

        function displayFitResult(fitResult, isStale) {
            const statusEl = document.getElementById('dev-calib-status');
            const tbody = document.getElementById('dev-calib-tbody');

            // Update table rows' residuals
            tbody.querySelectorAll('tr').forEach((tr, idx) => {
                const resTd = tr.querySelector('.calib-residual');
                if (resTd) {
                    if (!isStale && fitResult.residuals_nm && idx < fitResult.residuals_nm.length) {
                        resTd.innerText = fitResult.residuals_nm[idx].toFixed(4);
                    } else {
                        resTd.innerText = '-';
                    }
                }
            });

            let prefix = "";
            if (isStale) {
                prefix = "Stale — pairs changed since last fit:\n";
                statusEl.style.opacity = "0.6";
            } else {
                statusEl.style.opacity = "1";
            }

            statusEl.innerText = `${prefix}Fit Succeeded!\nDegree: ${fitResult.degree}\nRMS: ${fitResult.rms_nm.toFixed(4)} nm\nCoefficients: ${JSON.stringify(fitResult.coefficients)}`;
        }

        document.getElementById('dev-calib-fit-btn').addEventListener('click', async () => {
            savePairsToLocal();
            const statusEl = document.getElementById('dev-calib-status');
            const tbody = document.getElementById('dev-calib-tbody');
            const pairs = [];
            tbody.querySelectorAll('tr').forEach(tr => {
                const px = parseInt(tr.querySelector('.calib-pixel').value);
                const wl = parseFloat(tr.querySelector('.calib-wavelength').value);
                if (!isNaN(px) && !isNaN(wl)) {
                    pairs.push({ pixel: px, wavelength: wl });
                }
            });

            if (pairs.length < 2) {
                statusEl.innerText = "Error: At least 2 calibration points are required.";
                return;
            }

            statusEl.innerText = "Calculating fit and applying coefficients...";
            try {
                const res = await fetchDev('/api/dev/calibrate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pairs })
                });
                const data = await res.json();
                if (res.ok) {
                    const fitResult = {
                        degree: data.degree,
                        rms_nm: data.rms_nm,
                        coefficients: data.coefficients,
                        residuals_nm: data.residuals_nm
                    };
                    localStorage.setItem('calib_fit_result', JSON.stringify(fitResult));
                    localStorage.setItem('calib_fit_pairs', JSON.stringify(pairs));
                    
                    displayFitResult(fitResult, false);
                    fetchStatus();
                } else {
                    statusEl.innerText = `Fit Failed: ${data.detail}`;
                }
            } catch (err) {
                statusEl.innerText = `Connection error: ${err.message}`;
            }
        });

        // Password Modal Handlers
        let devPassword = '';

        function openPasswordModal() {
            document.getElementById('dev-password-input').value = '';
            document.getElementById('dev-password-error').style.display = 'none';
            document.getElementById('dev-password-modal').classList.remove('hidden');
            document.getElementById('dev-password-input').focus();
        }

        function closePasswordModal() {
            document.getElementById('dev-password-modal').classList.add('hidden');
        }

        document.getElementById('dev-password-cancel').addEventListener('click', closePasswordModal);
        
        document.getElementById('dev-password-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('dev-password-submit').click();
            }
        });

        document.getElementById('dev-password-submit').addEventListener('click', async () => {
            const pwd = document.getElementById('dev-password-input').value;
            const errorEl = document.getElementById('dev-password-error');
            errorEl.style.display = 'none';
            
            try {
                const urlObj = new URL('/api/dev/auth', window.location.origin);
                urlObj.searchParams.set('password', pwd);
                const res = await fetch(urlObj.toString());
                
                if (res.ok) {
                    devPassword = pwd;
                    closePasswordModal();
                    openControlModal();
                } else {
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error("Auth check failed:", err);
                errorEl.innerText = "Connection error: " + err.message;
                errorEl.style.display = 'block';
            }
        });

        // Global key event shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey) {
                const key = e.key.toUpperCase();
                if (key === 'D') {
                    e.preventDefault();
                    const modal = document.getElementById('dev-control-modal');
                    if (modal.classList.contains('hidden')) {
                        if (devPassword) {
                            openControlModal();
                        } else {
                            openPasswordModal();
                        }
                    } else {
                        closeControlModal();
                    }
                }
            }
        });

    </script>
</body>
